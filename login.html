<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inspens - Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-color: #2a52be; /* Royal blue */
      --primary-dark: #1a3a8f;
      --primary-light: #7b9de1;
      --accent-color: #ffc107; /* Gold accent */
      --text-dark: #0a0a0a;
      --text-medium: #4a4a4a;
      --text-light: #e0e0e0;
      --background: #121212;
      --card-bg: #1e1e1e;
      --white: #ffffff;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.5), 0 1px 2px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 6px rgba(0,0,0,0.4), 0 1px 3px rgba(0,0,0,0.3);
      --shadow-lg: 0 10px 20px rgba(0,0,0,0.5), 0 6px 6px rgba(0,0,0,0.4);
      --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background-color: var(--background);
      color: var(--text-light);
      line-height: 1.6;
      background: linear-gradient(135deg, #0a0a1a 0%, #12122b 100%);
    }

    /* Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: var(--card-bg);
      padding: 15px 5%;
      box-shadow: var(--shadow-sm);
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 1000;
      transition: var(--transition);
    }

    .navbar.scrolled {
      padding: 10px 5%;
      box-shadow: var(--shadow-md);
    }

    .logo {
      font-size: 24px;
      font-weight: 700;
      color: var(--white);
      display: flex;
      align-items: center;
      text-shadow: 0 0 10px rgba(42, 82, 190, 0.7);
    }

    .logo span {
      display: inline-block;
      transition: var(--transition);
    }

    .logo:hover span {
      transform: translateY(-3px);
      text-shadow: 0 0 15px rgba(42, 82, 190, 1);
    }

    .logo-icon {
      margin-right: 8px;
      font-size: 26px;
      color: var(--accent-color);
    }

    .nav-buttons {
      display: flex;
      gap: 15px;
    }

    .nav-buttons button {
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 500;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: var(--transition);
      transform: translateZ(0);
      backface-visibility: hidden;
    }

    .signup-btn {
      background-color: var(--primary-color);
      color: var(--white);
      position: relative;
      overflow: hidden;
    }

    .signup-btn:hover {
      background-color: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 0 20px rgba(42, 82, 190, 0.7);
    }

    .signup-btn::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 5px;
      height: 5px;
      background: rgba(255, 255, 255, 0.5);
      opacity: 0;
      border-radius: 100%;
      transform: scale(1, 1) translate(-50%);
      transform-origin: 50% 50%;
    }

    .signup-btn:focus:not(:active)::after {
      animation: ripple 0.6s ease-out;
    }

    @keyframes ripple {
      0% {
        transform: scale(0, 0);
        opacity: 0.5;
      }
      100% {
        transform: scale(20, 20);
        opacity: 0;
      }
    }

    /* Main Content */
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 100px 5% 50px;
    }

    .login-card {
      background: var(--card-bg);
      border-radius: 10px;
      padding: 40px;
      width: 100%;
      max-width: 500px;
      box-shadow: var(--shadow-lg);
      position: relative;
      overflow: hidden;
      transform: translateY(20px);
      opacity: 0;
      animation: fadeInUp 0.5s forwards;
    }

    @keyframes fadeInUp {
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 5px;
      background: var(--accent-color);
    }

    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .login-title {
      font-size: 2rem;
      color: var(--white);
      margin-bottom: 10px;
      position: relative;
    }

    .login-title::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 3px;
      background: var(--accent-color);
      border-radius: 2px;
    }

    .login-subtitle {
      color: var(--primary-light);
      font-size: 0.9rem;
    }

    .form-group {
      margin-bottom: 20px;
      position: relative;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-light);
      font-size: 0.9rem;
    }

    .form-control {
      width: 100%;
      padding: 12px 15px;
      background-color: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 5px;
      color: var(--white);
      font-family: 'Montserrat', sans-serif;
      transition: var(--transition);
    }

    .form-control:focus {
      outline: none;
      border-color: var(--primary-light);
      box-shadow: 0 0 0 2px rgba(42, 82, 190, 0.3);
    }

    .form-footer {
      margin-top: 30px;
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      font-weight: 600;
      background-color: var(--primary-color);
      color: var(--white);
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }

    .login-btn:hover {
      background-color: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(42, 82, 190, 0.5);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .login-btn::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 5px;
      height: 5px;
      background: rgba(255, 255, 255, 0.5);
      opacity: 0;
      border-radius: 100%;
      transform: scale(1, 1) translate(-50%);
      transform-origin: 50% 50%;
    }

    .login-btn:focus:not(:active)::after {
      animation: ripple 0.6s ease-out;
    }

    .signup-link {
      display: block;
      margin-top: 20px;
      text-align: center;
      color: var(--primary-light);
      text-decoration: none;
      transition: var(--transition);
    }

    .signup-link:hover {
      color: var(--accent-color);
      text-decoration: underline;
    }

    .input-icon {
      position: absolute;
      right: 15px;
      top: 38px;
      color: var(--text-light);
    }

    .admin-toggle {
      text-align: center;
      margin-top: 15px;
    }

    .admin-toggle-btn {
      background: none;
      border: none;
      color: var(--primary-light);
      cursor: pointer;
      font-size: 0.9rem;
      transition: var(--transition);
    }

    .admin-toggle-btn:hover {
      color: var(--accent-color);
      text-decoration: underline;
    }

    /* Form Validation */
    .error-message {
      color: #f44336;
      font-size: 0.8rem;
      margin-top: 5px;
      display: none;
    }

    .form-group.error .error-message {
      display: block;
    }

    .form-group.error .form-control {
      border-color: #f44336;
    }

    .form-group.success .form-control {
      border-color: #4caf50;
    }

    /* Footer */
    .footer {
      background-color: var(--card-bg);
      color: var(--white);
      padding: 30px 5%;
      text-align: center;
    }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .footer-link {
      color: var(--text-light);
      text-decoration: none;
      transition: var(--transition);
      font-size: 0.9rem;
    }

    .footer-link:hover {
      color: var(--accent-color);
    }

    .copyright {
      color: var(--text-light);
      font-size: 0.8rem;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      .login-container {
        padding: 80px 5% 40px;
      }
      
      .login-card {
        padding: 30px;
      }
      
      .login-title {
        font-size: 1.8rem;
      }
    }

    @media (max-width: 480px) {
      .navbar {
        padding: 15px 20px;
      }
      
      .nav-buttons button {
        padding: 8px 15px;
        font-size: 13px;
      }
      
      .login-card {
        padding: 25px 20px;
      }
      
      .login-title {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <div class="navbar">
    <div class="logo">
      <span class="logo-icon">💰</span>
      <span>Inspens</span>
    </div>
    <div class="nav-buttons">
      <a href="signup.html"><button class="signup-btn">Sign Up</button></a>
    </div>
  </div>

  <!-- Main Content -->
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <h1 class="login-title">Welcome Back</h1>
        <p class="login-subtitle">Sign in to access your financial dashboard</p>
      </div>
      
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
          <span class="error-message">Please enter a valid email address</span>
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
          <span class="error-message">Password must be at least 8 characters</span>
        </div>
        
        <div class="form-footer">
          <button type="submit" class="login-btn">Login</button>
          <div class="admin-toggle">
            <button type="button" class="admin-toggle-btn" id="adminToggle">Login as Admin</button>
          </div>
          <a href="signup.html" class="signup-link">Don't have an account? Sign Up</a>
        </div>
      </form>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-links">
      <a href="#" class="footer-link">About</a>
      <a href="#" class="footer-link">Privacy Policy</a>
      <a href="#" class="footer-link">Terms of Service</a>
      <a href="#" class="footer-link">Contact Us</a>
    </div>
    <p class="copyright">© 2023 Inspens. All rights reserved.</p>
  </footer>

  <script>
    // Form Validation and Authentication
    const loginForm = document.getElementById('loginForm');
    const adminToggle = document.getElementById('adminToggle');
    let isAdminLogin = false;

    // Toggle between user and admin login
    adminToggle.addEventListener('click', function() {
      isAdminLogin = !isAdminLogin;
      const loginTitle = document.querySelector('.login-title');
      const loginSubtitle = document.querySelector('.login-subtitle');
      
      if (isAdminLogin) {
        loginTitle.textContent = 'Admin Login';
        loginSubtitle.textContent = 'Sign in to access admin dashboard';
        adminToggle.textContent = 'Login as User';
      } else {
        loginTitle.textContent = 'Welcome Back';
        loginSubtitle.textContent = 'Sign in to access your financial dashboard';
        adminToggle.textContent = 'Login as Admin';
      }
    });

    // Form submission
    loginForm.addEventListener('submit', function(e) {
      e.preventDefault();
      
      // Reset error states
      document.querySelectorAll('.form-group').forEach(group => {
        group.classList.remove('error', 'success');
      });
      
      let isValid = true;
      
      // Validate email
      const emailInput = document.getElementById('email');
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(emailInput.value)) {
        emailInput.parentElement.classList.add('error');
        isValid = false;
      } else {
        emailInput.parentElement.classList.add('success');
      }
      
      // Validate password
      const passwordInput = document.getElementById('password');
      if (passwordInput.value.length < 8) {
        passwordInput.parentElement.classList.add('error');
        isValid = false;
      } else {
        passwordInput.parentElement.classList.add('success');
      }
      
      // If form is valid, proceed with authentication
      if (isValid) {
        // Here you would typically send the data to your backend for authentication
        // For demo purposes, we'll use mock authentication
        
        const email = emailInput.value;
        const password = passwordInput.value;
        
        // Mock admin credentials (in real app, this would be server-side)
        const adminEmail = "admin@inspens.com";
        const adminPassword = "Admin@123";
        
        // Mock user credentials (in real app, this would be server-side)
        const userEmail = "user@inspens.com";
        const userPassword = "User@123";
        
        if (isAdminLogin) {
          // Admin authentication
          if (email === adminEmail && password === adminPassword) {
            alert('Admin login successful! Redirecting to admin dashboard...');
            window.location.href = 'admin-dashboard.html';
          } else {
            alert('Invalid admin credentials. Please try again.');
          }
        } else {
          // User authentication
          if (email === userEmail && password === userPassword) {
            alert('Login successful! Redirecting to your dashboard...');
            window.location.href = 'user-dashboard.html';
          } else {
            alert('Invalid credentials. Please try again.');
          }
        }
      }
    });
    
    // Navbar scroll effect
    window.addEventListener('scroll', function() {
      const navbar = document.querySelector('.navbar');
      if (window.scrollY > 50) {
        navbar.classList.add('scrolled');
      } else {
        navbar.classList.remove('scrolled');
      }
    });
  </script>
</body>
</html>
