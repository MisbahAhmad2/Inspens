<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inspens - Logout</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-color: #2a52be; /* Royal blue */
      --primary-dark: #1a3a8f;
      --primary-light: #7b9de1;
      --accent-color: #ffc107; /* Gold accent */
      --text-dark: #0a0a0a;
      --text-medium: #4a4a4a;
      --text-light: #e0e0e0;
      --background: #121212;
      --card-bg: #1e1e1e;
      --white: #ffffff;
      --error-color: #f44336;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.5), 0 1px 2px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 6px rgba(0,0,0,0.4), 0 1px 3px rgba(0,0,0,0.3);
      --shadow-lg: 0 10px 20px rgba(0,0,0,0.5), 0 6px 6px rgba(0,0,0,0.4);
      --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background-color: var(--background);
      color: var(--text-light);
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: var(--card-bg);
      padding: 15px 5%;
      box-shadow: var(--shadow-sm);
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 1000;
      transition: var(--transition);
    }

    .navbar.scrolled {
      padding: 10px 5%;
      box-shadow: var(--shadow-md);
    }

    .logo {
      font-size: 24px;
      font-weight: 700;
      color: var(--white);
      display: flex;
      align-items: center;
      text-shadow: 0 0 10px rgba(42, 82, 190, 0.7);
    }

    .logo span {
      display: inline-block;
      transition: var(--transition);
    }

    .logo:hover span {
      transform: translateY(-3px);
      text-shadow: 0 0 15px rgba(42, 82, 190, 1);
    }

    .logo-icon {
      margin-right: 8px;
      font-size: 26px;
      color: var(--accent-color);
    }

    /* Main Content */
    .logout-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 100px 5% 50px;
      max-width: 600px;
      margin: 0 auto;
      text-align: center;
    }

    .logout-card {
      background: var(--card-bg);
      border-radius: 10px;
      padding: 40px;
      box-shadow: var(--shadow-lg);
      width: 100%;
      transition: var(--transition);
    }

    .logout-icon {
      font-size: 3.5rem;
      color: var(--error-color);
      margin-bottom: 20px;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    .logout-title {
      font-size: 2rem;
      color: var(--white);
      margin-bottom: 15px;
    }

    .logout-message {
      color: var(--text-light);
      margin-bottom: 30px;
      font-size: 1.1rem;
    }

    .btn-group {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }

    .btn {
      padding: 12px 30px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background-color: var(--error-color);
      color: var(--white);
    }

    .btn-primary:hover {
      background-color: #d32f2f;
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(244, 67, 54, 0.4);
    }

    .btn-secondary {
      background-color: rgba(255, 255, 255, 0.1);
      color: var(--white);
    }

    .btn-secondary:hover {
      background-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
    }

    /* Footer */
    .footer {
      background-color: var(--card-bg);
      color: var(--white);
      padding: 30px 5%;
      text-align: center;
    }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .footer-link {
      color: var(--text-light);
      text-decoration: none;
      transition: var(--transition);
      font-size: 0.9rem;
    }

    .footer-link:hover {
      color: var(--accent-color);
    }

    .copyright {
      color: var(--text-light);
      font-size: 0.8rem;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      .logout-container {
        padding: 90px 5% 40px;
      }
      
      .logout-card {
        padding: 30px;
      }
      
      .btn-group {
        flex-direction: column;
        gap: 15px;
      }
      
      .btn {
        width: 100%;
        justify-content: center;
      }
    }

    @media (max-width: 480px) {
      .navbar {
        padding: 15px 20px;
      }
      
      .logout-title {
        font-size: 1.8rem;
      }
      
      .logout-message {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <div class="navbar">
    <div class="logo">
      <span class="logo-icon">💰</span>
      <span>Inspens</span>
    </div>
  </div>

  <!-- Logout Content -->
  <div class="logout-container">
    <div class="logout-card">
      <div class="logout-icon">
        <i class="fas fa-sign-out-alt"></i>
      </div>
      <h1 class="logout-title">Logout Confirmation</h1>
      <p class="logout-message">Are you sure you want to logout of your Inspens account? You'll need to sign in again to access your dashboard and financial data.</p>
      
      <div class="btn-group">
        <button class="btn btn-primary" id="confirmLogout">
          <i class="fas fa-sign-out-alt"></i> Yes, Logout
        </button>
        <button class="btn btn-secondary" id="cancelLogout">
          <i class="fas fa-times"></i> Cancel
        </button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-links">
      <a href="about.html" class="footer-link">About</a>
      <a href="privacy.html" class="footer-link">Privacy Policy</a>
      <a href="terms.html" class="footer-link">Terms of Service</a>
      <a href="contact.html" class="footer-link">Contact Us</a>
    </div>
    <p class="copyright">© 2023 Inspens. All rights reserved.</p>
  </footer>

  <script>
    // Navbar scroll effect
    window.addEventListener('scroll', function() {
      const navbar = document.querySelector('.navbar');
      if (window.scrollY > 50) {
        navbar.classList.add('scrolled');
      } else {
        navbar.classList.remove('scrolled');
      }
    });

    // Logout functionality
    document.getElementById('confirmLogout').addEventListener('click', function() {
      // In a real application, you would:
      // 1. Send a request to invalidate the session
      // 2. Clear any client-side authentication tokens
      // 3. Redirect to login page
      
      // For this demo, we'll simulate with a delay
      this.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging out...';
      this.disabled = true;
      
      setTimeout(function() {
        // Clear any stored user data (simulating session clearing)
        localStorage.removeItem('authToken');
        sessionStorage.clear();
        
        // Redirect to home page
        window.location.href = 'index.html';
      }, 1500);
    });

    // Cancel logout
    document.getElementById('cancelLogout').addEventListener('click', function() {
      // Redirect back to dashboard
      window.location.href = 'dashboard.html';
    });


  </script>
</body>
</html>
