<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inspens - Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary-color: #2a52be;
      --primary-dark: #1a3a8f;
      --primary-light: #7b9de1;
      --accent-color: #ffc107;
      --text-dark: #0a0a0a;
      --text-medium: #4a4a4a;
      --text-light: #e0e0e0;
      --background: #121212;
      --card-bg: #1e1e1e;
      --white: #ffffff;
      --shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
      --transition: all 0.3s ease;
      --success-color: #4caf50;
      --danger-color: #f44336;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(135deg, #0a0a1a 0%, #12122b 100%);
      color: var(--text-light);
      line-height: 1.6;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color:  var(--card-bg);
      padding: 15px 5%;
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 1000;
      box-shadow: var(--shadow);
      transition: var(--transition);
    }

    .navbar.scrolled {
      padding: 10px 5%;
      box-shadow: var(--shadow);
    }

    .logo {
      font-size: 24px;
      font-weight: 700;
      color: var(--white);
      display: flex;
      align-items: center;
    }

    .logo-icon {
      margin-right: 8px;
      font-size: 26px;
      color: var(--accent-color);
    }

    .nav-right {
      display: flex;
      align-items: center;
    }

    .profile-btn {
      background: none;
      border: none;
      color: var(--white);
      display: flex;
      align-items: center;
      cursor: pointer;
      font-size: 16px;
      transition: var(--transition);
    }

    .profile-btn:hover {
      color: var(--accent-color);
    }

    .profile-img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      margin-right: 10px;
      border: 2px solid var(--accent-color);
    }

    .profile-dropdown {
      position: relative;
    }

    .dropdown-menu {
      display: none;
      position: absolute;
      right: 0;
      background: var(--card-bg);
      border-radius: 5px;
      box-shadow: var(--shadow);
      z-index: 100;
    }

    .profile-dropdown:hover .dropdown-menu {
      display: block;
    }

    .dropdown-item {
      padding: 10px 15px;
      color: var(--text-light);
      text-decoration: none;
      display: flex;
      align-items: center;
      transition: var(--transition);
    }

    .dropdown-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .profile-container {
      padding: 100px 5% 50px;
      max-width: 800px;
      margin: 0 auto;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .page-title {
      font-size: 2rem;
      color: var(--white);
      position: relative;
    }

    .page-title::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 0;
      width: 60px;
      height: 3px;
      background: var(--accent-color);
      border-radius: 2px;
    }

    .back-btn {
      background-color: rgba(255, 255, 255, 0.1);
      color: var(--white);
      border: none;
      border-radius: 5px;
      padding: 10px 20px;
      cursor: pointer;
      transition: var(--transition);
    }

    .back-btn:hover {
      background-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
    }

    .profile-card {
      background: var(--card-bg);
      border-radius: 10px;
      padding: 30px;
      box-shadow: var(--shadow);
      margin-bottom: 30px;
    }

    .profile-header {
      display: flex;
      align-items: center;
      margin-bottom: 30px;
    }

    .profile-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--primary-light);
      margin-right: 20px;
      transition: var(--transition);
    }

    .profile-avatar:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(42, 82, 190, 0.5);
    }

    .profile-info h2 {
      font-size: 1.5rem;
      margin-bottom: 5px;
      color: var(--white);
    }

    .profile-info p {
      color: var(--text-light);
      opacity: 0.8;
      font-size: 0.9rem;
    }

    .edit-avatar-btn {
      background: none;
      border: none;
      color: var(--primary-light);
      font-size: 0.8rem;
      cursor: pointer;
      margin-top: 10px;
      transition: var(--transition);
    }

    .edit-avatar-btn:hover {
      color: var(--accent-color);
    }

    .profile-form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group.full-width {
      grid-column: span 2;
    }

    .form-group label {
      display: block;
      margin-bottom: 10px;
      color: var(--text-light);
      font-weight: 500;
    }

    .form-control {
      width: 100%;
      padding: 12px 15px;
      background-color: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 5px;
      color: var(--white);
      transition: var(--transition);
    }

    .form-control:focus {
      outline: none;
      border-color: var(--primary-light);
      box-shadow: 0 0 0 2px rgba(42, 82, 190, 0.3);
    }

    .form-footer {
      grid-column: span 2;
      display: flex;
      justify-content: flex-end;
      gap: 15px;
      margin-top: 20px;
    }

    .btn {
      padding: 12px 25px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: var(--transition);
    }

    .btn-primary {
      background-color: var(--primary-color);
      color: var(--white);
    }

    .btn-primary:hover {
      background-color: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(42, 82, 190, 0.5);
    }

    .btn-secondary {
      background-color: rgba(255, 255, 255, 0.1);
      color: var(--white);
    }

    .btn-secondary:hover {
      background-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
    }

    .password-change {
      background: var(--card-bg);
      border-radius: 10px;
      padding: 30px;
      box-shadow: var(--shadow);
      margin-top: 40px;
    }

    .section-title {
      font-size: 1.5rem;
      color: var(--white);
      margin-bottom: 20px;
      position: relative;
    }

    .section-title::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 0;
      width: 40px;
      height: 2px;
      background: var(--accent-color);
      border-radius: 2px;
    }

    .password-toggle {
      position: relative;
    }

    .password-toggle .form-control {
      padding-right: 40px;
    }

    .toggle-password {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-light);
      cursor: pointer;
      opacity: 0.7;
      transition: var(--transition);
    }

    .toggle-password:hover {
      opacity: 1;
      color: var(--accent-color);
    }

    .success-message {
      background-color: rgba(76, 175, 80, 0.2);
      color: var(--success-color);
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
      display: none;
      align-items: center;
      gap: 10px;
    }

    .footer {
      background-color: var(--card-bg);
      color: var(--white);
      padding: 30px 5%;
      text-align: center;
      margin-top: 50px;
    }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .footer-link {
      color: var(--text-light);
      text-decoration: none;
      transition: var(--transition);
      font-size: 0.9rem;
    }

    .footer-link:hover {
      color: var(--accent-color);
    }

    .copyright {
      color: var(--text-light);
      font-size: 0.8rem;
    }

    @media (max-width: 768px) {
      .profile-container {
        padding: 90px 5% 40px;
      }
      
      .profile-header {
        flex-direction: column;
        text-align: center;
      }
      
      .profile-avatar {
        margin-right: 0;
        margin-bottom: 20px;
      }
      
      .profile-form {
        grid-template-columns: 1fr;
      }
      
      .form-group.full-width {
        grid-column: span 1;
      }
      
      .form-footer {
        grid-column: span 1;
        justify-content: center;
      }
    }

    @media (max-width: 480px) {
      .navbar {
        padding: 15px 20px;
      }
      
      .page-title {
        font-size: 1.8rem;
      }
      
      .btn {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>

  <div class="navbar">
    <div class="logo">
      <span class="logo-icon">💰</span>
      <span>Inspens</span>
    </div>
    <div class="nav-right">
      <div class="profile-dropdown">
        <button class="profile-btn">
          <img src="https://tse1.mm.bing.net/th?id=OIP.962LUqJ0mS6poVTnmkBKXAHaHa&pid=Api" alt="Profile" class="profile-img">
          <span>Iman Fatima</span>
          <i class="fas fa-chevron-down"></i>
        </button>
        <div class="dropdown-menu">
          <a href="profile.html" class="dropdown-item">
            <i class="fas fa-user"></i> My Profile
          </a>
          <div class="dropdown-divider"></div>
          <a href="logout.html" class="dropdown-item logout-btn">
            <i class="fas fa-sign-out-alt"></i> Logout
          </a>
        </div>
      </div>
    </div>
  </div>

  <div class="profile-container">
    <div class="page-header">
      <h1 class="page-title">My Profile</h1>
      <button class="back-btn" onclick="window.location.href='dashboard.html'">
        <i class="fas fa-arrow-left"></i> Back to Dashboard
      </button>
    </div>

    <div class="success-message" id="successMessage">
      <i class="fas fa-check-circle"></i>
      <span>Profile updated successfully!</span>
    </div>

    <div class="profile-card">
      <div class="profile-header">
        <img src="https://tse1.mm.bing.net/th?id=OIP.962LUqJ0mS6poVTnmkBKXAHaHa&pid=Api" alt="Profile" class="profile-avatar" id="profileAvatar">
        <div class="profile-info">
          <h2 id="profileName">Misbah Ahmad</h2>
          <p id="profileEmail">misbah.ahmad@example.com</p>
          <button class="edit-avatar-btn" id="changeAvatarBtn">
            <i class="fas fa-camera"></i> Change Photo
          </button>
        </div>
      </div>

      <form class="profile-form" id="profileForm">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" class="form-control" value="Misbah" required>
        </div>
        
        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" class="form-control" value="Ahmad" required>
        </div>
        
        <div class="form-group full-width">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-control" value="misbah.ahmad@example.com" required>
        </div>
        
        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" class="form-control" value="+92 1234567890">
        </div>
        
        <div class="form-group">
          <label for="dob">Date of Birth</label>
          <input type="date" id="dob" class="form-control" value="2004-01-02">
        </div>
        
        <div class="form-group full-width">
          <label for="address">Address</label>
          <textarea id="address" class="form-control" rows="2">123 Main St, Apt 4B, shadman colony,lahore </textarea>
        </div>
        
        <div class="form-footer">
          <button type="reset" class="btn btn-secondary">
            <i class="fas fa-undo"></i> Reset
          </button>
          <button type="submit" class="btn btn-primary">
            <i class="fas fa-save"></i> Save Changes
          </button>
        </div>
      </form>
    </div>

    <div class="password-change">
      <h2 class="section-title">Change Password</h2>
      
      <form id="passwordForm">
        <div class="form-group full-width">
          <label for="currentPassword">Current Password</label>
          <div class="password-toggle">
            <input type="password" id="currentPassword" class="form-control" required>
            <button type="button" class="toggle-password" data-target="currentPassword">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>
        
        <div class="form-group full-width">
          <label for="newPassword">New Password</label>
          <div class="password-toggle">
            <input type="password" id="newPassword" class="form-control" required>
            <button type="button" class="toggle-password" data-target="newPassword">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>
        
        <div class="form-group full-width">
          <label for="confirmPassword">Confirm New Password</label>
          <div class="password-toggle">
            <input type="password" id="confirmPassword" class="form-control" required>
            <button type="button" class="toggle-password" data-target="confirmPassword">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>
        
        <div class="form-footer">
          <button type="submit" class="btn btn-primary">
            <i class="fas fa-key"></i> Update Password
          </button>
        </div>
      </form>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-links">
      <a href="about.html" class="footer-link">About</a>
      <a href="privacy.html" class="footer-link">Privacy Policy</a>
      <a href="terms.html" class="footer-link">Terms of Service</a>
      <a href="help.html" class="footer-link">Contact Us</a>
    </div>
    <p class="copyright">© 2023 Inspens. All rights reserved.</p>
  </footer>

  <script>
    const profileForm = document.getElementById('profileForm');
    const passwordForm = document.getElementById('passwordForm');
    const successMessage = document.getElementById('successMessage');
